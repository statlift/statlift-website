<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#808080;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  <!-- S shape with arrow -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
    font-family="Arial Black, sans-serif" font-size="42" font-weight="900"
    fill="url(#metal)" filter="url(#glow)"
    stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.4">S</text>
  <!-- Arrow tip pointing up -->
  <polygon points="42,10 46,18 38,18" fill="url(#metal)" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.4"/>
</svg>